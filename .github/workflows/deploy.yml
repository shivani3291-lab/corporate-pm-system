name: Corporate PM CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Azure?'
        type: choice
        required: true
        default: 'false'
        options:
          - 'false'
          - 'true'

jobs:

  # ── Job 1: Frontend ─────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Type check
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ── Job 2: Backend ──────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        working-directory: backend
        run: pnpm install

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec prisma generate

      - name: Build
        working-directory: backend
        run: pnpm build

      - name: Prepare deployment package
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cp package.json dist/
          cp -r prisma dist/
          cd dist
          npm install --omit=dev

      - name: Fix start script in package.json
        working-directory: backend/dist
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.scripts.start = 'node index.js';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

  # ── Job 3: AI Service ────────────────────────────────────────
  build-ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ai-service
        run: python -m pytest --tb=short -q || echo "No tests found, skipping"

  # ── Deploy: only when manually triggered with deploy=true ────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, build-ai-service]
    environment: production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

      - name: Deploy frontend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: corporate-pm-frontend
          package: frontend/dist

      - name: Deploy backend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: corporate-pm-backend
          package: backend/dist

      - name: Deploy AI service to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: corporate-pm-ai
          package: ai-service